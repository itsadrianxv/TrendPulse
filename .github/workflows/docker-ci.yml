name: Docker CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  dockerfile-check:
    name: Build & Test Dockerfile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create deploy env file
        run: |
          cat << 'EOF' > deploy/.env
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY=${{ secrets.NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY }}
          NEXT_PUBLIC_GA_ID=${{ secrets.NEXT_PUBLIC_GA_ID }}
          NEXT_PUBLIC_GITHUB_LATEST_RELEASE_URL=${{ secrets.NEXT_PUBLIC_GITHUB_LATEST_RELEASE_URL }}
          FEISHU_WEBHOOK_URL=
          ALERT_TIMEZONE=Asia/Shanghai
          ENABLE_ALERT_WORKER=true
          POSTGRES_DB=fund_alert
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres
          DATABASE_URL=postgres://postgres:postgres@postgres:5432/fund_alert
          WEB_PORT=3000
          EOF

      - name: Build Dockerfile image
        run: |
          docker build -f deploy/Dockerfile -t real-time-fund \
            --build-arg NEXT_PUBLIC_SUPABASE_URL="${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            --build-arg NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY="${{ secrets.NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY }}" \
            --build-arg NEXT_PUBLIC_GA_ID="${{ secrets.NEXT_PUBLIC_GA_ID }}" \
            --build-arg NEXT_PUBLIC_GITHUB_LATEST_RELEASE_URL="${{ secrets.NEXT_PUBLIC_GITHUB_LATEST_RELEASE_URL }}" \
            .

      - name: Run Dockerfile container
        run: |
          docker run -d --name fund --env-file deploy/.env -p 3000:3000 real-time-fund
          echo "Waiting 10 seconds for the container to start..."
          sleep 10

      - name: Test service
        run: |
          curl -f http://localhost:3000 || (docker logs fund && exit 1)

      - name: Cleanup
        if: always()
        run: |
          docker stop fund || true
          docker rm fund || true

  docker-compose-check:
    name: Build & Test Docker Compose
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create deploy env file
        run: |
          cat << 'EOF' > deploy/.env
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY=${{ secrets.NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY }}
          NEXT_PUBLIC_GA_ID=${{ secrets.NEXT_PUBLIC_GA_ID }}
          NEXT_PUBLIC_GITHUB_LATEST_RELEASE_URL=${{ secrets.NEXT_PUBLIC_GITHUB_LATEST_RELEASE_URL }}
          FEISHU_WEBHOOK_URL=
          ALERT_TIMEZONE=Asia/Shanghai
          ENABLE_ALERT_WORKER=true
          POSTGRES_DB=fund_alert
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres
          DATABASE_URL=postgres://postgres:postgres@postgres:5432/fund_alert
          WEB_PORT=3000
          EOF

      - name: Docker Compose up
        run: |
          docker compose --env-file deploy/.env -f deploy/docker-compose.yml up -d --build
          echo "Waiting 10 seconds for services to start..."
          sleep 10

      - name: Test app service
        run: |
          curl -f http://localhost:3000 || (docker compose --env-file deploy/.env -f deploy/docker-compose.yml logs web && exit 1)

      - name: Cleanup
        if: always()
        run: docker compose --env-file deploy/.env -f deploy/docker-compose.yml down