name: Docker CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  dockerfile-check:
    name: Build deploy/Dockerfile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create runtime env file
        run: |
          cat << 'EOF' > .env.local
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY=${{ secrets.NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY }}
          NEXT_PUBLIC_GA_ID=${{ secrets.NEXT_PUBLIC_GA_ID }}
          NEXT_PUBLIC_GITHUB_LATEST_RELEASE_URL=${{ secrets.NEXT_PUBLIC_GITHUB_LATEST_RELEASE_URL }}
          FEISHU_WEBHOOK_URL=https://example.com/webhook
          ALERT_TIMEZONE=Asia/Shanghai
          ENABLE_ALERT_WORKER=false
          DATABASE_URL=postgres://postgres:postgres@127.0.0.1:5432/fund_alert
          EOF

      - name: Build Docker image
        run: |
          docker build \
            -f deploy/Dockerfile \
            -t real-time-fund \
            --build-arg NEXT_PUBLIC_SUPABASE_URL="${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            --build-arg NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY="${{ secrets.NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY }}" \
            --build-arg NEXT_PUBLIC_GA_ID="${{ secrets.NEXT_PUBLIC_GA_ID }}" \
            --build-arg NEXT_PUBLIC_GITHUB_LATEST_RELEASE_URL="${{ secrets.NEXT_PUBLIC_GITHUB_LATEST_RELEASE_URL }}" \
            .

      - name: Run container
        run: |
          docker run -d --name fund --env-file .env.local -p 3000:3000 real-time-fund
          echo "Waiting 10 seconds for the container to start..."
          sleep 10

      - name: Test service
        run: |
          curl -f http://localhost:3000 || (docker logs fund && exit 1)

      - name: Cleanup
        if: always()
        run: |
          docker rm -f fund || true

  docker-compose-check:
    name: Build deploy/docker-compose.yml
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deploy env file
        run: |
          cat << 'EOF' > deploy/.env
          NODE_IMAGE=node:22-bullseye
          POSTGRES_IMAGE=postgres:16
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY=${{ secrets.NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY }}
          NEXT_PUBLIC_GA_ID=${{ secrets.NEXT_PUBLIC_GA_ID }}
          NEXT_PUBLIC_GITHUB_LATEST_RELEASE_URL=${{ secrets.NEXT_PUBLIC_GITHUB_LATEST_RELEASE_URL }}
          FEISHU_WEBHOOK_URL=https://example.com/webhook
          ALERT_TIMEZONE=Asia/Shanghai
          ENABLE_ALERT_WORKER=true
          POSTGRES_DB=fund_alert
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres
          DATABASE_URL=postgres://postgres:postgres@postgres:5432/fund_alert
          WEB_PORT=3000
          EOF

      - name: Docker Compose up
        run: |
          docker compose -f deploy/docker-compose.yml --env-file deploy/.env up -d --build
          echo "Waiting 15 seconds for services to start..."
          sleep 15

      - name: Test web service
        run: |
          curl -f http://localhost:3000 || (docker compose -f deploy/docker-compose.yml --env-file deploy/.env logs web && exit 1)

      - name: Cleanup
        if: always()
        run: |
          docker compose -f deploy/docker-compose.yml --env-file deploy/.env down -v
