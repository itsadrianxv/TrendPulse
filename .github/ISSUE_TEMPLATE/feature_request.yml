name: 功能建议
description: 提出新的能力、体验或架构改进建议
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议。请尽量说明具体场景，而不是只描述一个抽象想法。

  - type: textarea
    id: problem
    attributes:
      label: 你想解决什么问题
      description: 先描述当前痛点或使用场景
      placeholder: 当前在什么情况下会不方便、低效或无法完成任务？
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 你希望的解决方案
      description: 说明建议的功能形态、交互或接口
      placeholder: 你希望它如何工作？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 你考虑过的替代方案
      description: 如果有其他方案，也欢迎一起说明

  - type: textarea
    id: context
    attributes:
      label: 额外上下文
      description: 可补充截图、参考链接、竞品案例或数据来源
